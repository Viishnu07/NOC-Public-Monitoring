name: NOC Bot & Deploy

on:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: '4,11,17,24,31,38,44,51,58 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  monitor-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git pull --rebase to work correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y mtr-tiny traceroute
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        run: python monitor.py

      - name: Commit and push data
        run: |
          git config --global user.name "NOC Bot"
          git config --global user.email "bot@noc.local"
          git add public/status.json public/history.json
          
          # Commit changes if they exist
          git commit -m "Update NOC status data" || echo "No changes to commit"
          
          # Pull latest changes from remote to avoid rejection errors
          git pull --rebase origin main
          
          # Push the updated branch
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install NPM dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
