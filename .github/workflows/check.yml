name: NOC Monitor Check

on:
  schedule:
    # Explicitly shifted away from the 0/5/10/15 minute global bottlenecks
    # Running exactly at: 4, 11, 17, 24, 31, 38, 44, 51, 58 minutes past the hour
    - cron: '4,11,17,24,31,38,44,51,58 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y mtr-tiny traceroute
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        run: python monitor.py

      - name: Commit and push changes
        run: |
          git config --global user.name "NOC Bot"
          git config --global user.email "bot@noc.local"
          git add public/status.json public/history.json
          git commit -m "Update NOC status data" || echo "No changes to commit"
          git push
